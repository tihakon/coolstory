<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Crypto Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #0e1621;
            --container-bg: #151921;
            --accent-color: #00a884; /* Зеленый цвет */
            --error-color: #f44336;  /* Красный цвет для ошибки */
            --text-color: #e9edef;
            --border-color: #30363d;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            display: flex; 
            justify-content: center;
            height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--container-bg); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            padding: 40px 20px;
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #20262d; 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        /* ЭКРАН ЧАТА */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
        }

        .header {
            padding: 15px;
            background: #20262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Базовый стиль для индикатора статуса */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #555; 
            border-radius: 50%;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Зеленый цвет при успешной синхронизации */
        .status-dot.success {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Красный цвет при ошибке сети */
        .status-dot.error {
            background-color: var(--error-color);
            box-shadow: 0 0 8px var(--error-color);
        }

        #messages { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .msg-item { 
            background: #20262d; 
            padding: 10px 15px; 
            border-radius: 10px; 
            max-width: 85%; 
            word-wrap: break-word;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 10px;
            background: #20262d;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #msgInput { margin: 0; flex-grow: 1; }
        .send-btn { width: auto; padding: 12px 20px; }
        .add-btn { width: auto; padding: 12px 20px; }
    </style>
</head>
<body link="red" vlink="#cecece" alink="#ff0000" bgcolor="black">

<div id="login-screen">
    <h2 style="margin-bottom: 30px;">🔐 cryptochat</h2>
    <input type="text" id="userName" placeholder="Ваше имя">
    <input type="password" id="seedPhrase" placeholder="Сид-фраза">
    <button onclick="enterChat()">Войти в чат</button>
</div>

<div id="chat-screen">
    <div class="header">
        <span id="display-name" style="font-weight: bold;"></span>
        <div class="header-controls">
            <!-- Трехцветный индикатор статуса -->
            <div id="statusDot" class="status-dot" title="Статус сети"></div>
            <button onclick="loadMessages()" style="width:auto; padding: 5px 10px; font-size: 12px; background: #30363d;">Обновить</button>
        </div>
    </div>
    
    <div id="messages"></div>

    <div class="input-area">
        <textarea id="msgInput" rows="3" placeholder="Введите сообщение..."></textarea>
        <button class="add-btn" onclick="random()">🞤</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const GITHUB_TOKEN = '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'; 
    const GIST_ID = '336402aaf7f31fecfe6653a516491e04';
    const FILE_NAME = 'kalimbar.txt';

    let currentUser = '';
    let currentSeed = '';
    let updateInterval = null; // Переменная для хранения таймера обновлений

    function enterChat() {
        currentUser = document.getElementById('userName').value.trim();
        currentSeed = document.getElementById('seedPhrase').value.trim();

        if (!currentUser || !currentSeed) return alert("Введите данные!");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('display-name').innerText = currentUser;
        
        loadMessages();

        // Запуск автообновления раз в 30 секунд для экономии лимитов запросов GitHub API
        if (!updateInterval) {
            updateInterval = setInterval(loadMessages, 30000);
        }
    }

    // Обработка Enter в текстовом поле
    document.getElementById('msgInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            sendMessage();
        }
    });

    // Управление состояниями трехцветного индикатора
    function setStatus(state) {
        const dot = document.getElementById('statusDot');
        if (!dot) return;

        // Сбрасываем старые стили
        dot.classList.remove('success', 'error');

        if (state === 'success') {
            dot.classList.add('success');
            // Зеленый индикатор горит ровно 1 секунду, подтверждая обновление, затем гаснет в серый
            setTimeout(() => {
                if (dot.classList.contains('success')) {
                    dot.classList.remove('success');
                }
            }, 1000);
        } else if (state === 'error') {
            // Красный индикатор горит постоянно, сигнализируя о проблеме с сетью или лимитами
            dot.classList.add('error');
        }
    }

    async function loadMessages() {
        const msgDiv = document.getElementById('messages');
        try {
            // Передаем токен авторизации в заголовках. Это поднимает лимит GitHub API с 60 до 5000 запросов в час.
            // Вместо ?t=Date.now() используем заголовок 'If-None-Match', который браузеры обрабатывают корректно без лишней траты лимитов.
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Cache-Control': 'no-cache'
                }
            });
            
            if (!response.ok) throw new Error("Ошибка сервера GitHub");

            const data = await response.json();
            const content = data.files[FILE_NAME].content;
            
            const lines = content.split('\n');
            msgDiv.innerHTML = '';

            lines.forEach(line => {
                if (!line.trim()) return;
                try {
                    const bytes = CryptoJS.AES.decrypt(line, currentSeed);
                    const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                    if (decrypted) {
                        msgDiv.innerHTML += `<div class="msg-item" id="msg-">${decrypted}</div>`;
                    }
                } catch (e) {}
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
            
            // Всё прошло успешно — активируем зелёную вспышку
            setStatus('success');
            
        } catch (err) {
            // Ошибка связи — включаем красный индикатор
            setStatus('error');
            
            // Выводим текст ошибки только при первом запуске, если сообщений на экране ещё нет
            if (msgDiv.children.length === 0) {
                msgDiv.innerHTML = '<center style="color: #f44336; padding: 20px;">Ошибка загрузки истории. Возможно, исчерпан лимит запросов GitHub. Подождите немного.</center>';
            }
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const fullMessage = `${currentUser}: ${text}`;
        const encrypted = CryptoJS.AES.encrypt(fullMessage, currentSeed).toString();

        input.value = ''; // Очищаем поле ввода для удобства пользователя

        try {
            const getResp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const getData = await getResp.json();
            const oldContent = getData.files[FILE_NAME].content;
            const newContent = oldContent + (oldContent ? '\n' : '') + encrypted;

            await fetch(`https://github.com{GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [FILE_NAME]: { content: newContent } }
                })
            });
            
            // Сразу после отправки принудительно обновляем чат, не дожидаясь таймера
            loadMessages();
        } catch (err) {
            setStatus('error');
            alert("Ошибка сети при отправке");
        }
    }

    // Заглушка для предотвращения ошибок при нажатии на кнопку "+"
    function random() {
        console.log("Дополнительная кнопка действия нажата");
    }
</script>

</body>

</html>
